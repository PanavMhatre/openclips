name: Daily Publish

on:
  schedule:
    # 2 times a day: 10 AM and 6 PM UTC (5 AM / 1 PM CT)
    - cron: '0 10,18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (plan only, no Buffer posts)'
        type: boolean
        default: false
      skip_fetch:
        description: 'Skip YouTube fetch, use existing clip pool'
        type: boolean
        default: false
      publish_date:
        description: 'Force a specific publishing date (YYYY-MM-DD). Leave blank to post immediately.'
        type: string
        default: ''
      clip_count:
        description: 'Number of clips to post per run'
        type: string
        default: '7'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    services:
      bgutil-provider:
        image: brainicism/bgutil-ytdlp-pot-provider
        ports:
          - 4416:4416

    permissions:
      contents: write

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
      NVIDIA_API_KEYS: ${{ secrets.NVIDIA_API_KEYS }}
      NVIDIA_DEEPSEEK_API_KEYS: ${{ secrets.NVIDIA_DEEPSEEK_API_KEYS }}
      OPENCLIPS_ORACLE_URL: ${{ secrets.OPENCLIPS_ORACLE_URL }}
      OPENCLIPS_RENDER_URL: ${{ secrets.OPENCLIPS_RENDER_URL }}
      OPENCLIPS_FETCH_SECRET: ${{ secrets.OPENCLIPS_FETCH_SECRET }}
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
      BUFFER_CHANNEL_IDS: ${{ secrets.BUFFER_CHANNEL_IDS }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      GITHUB_STORAGE_TOKEN: ${{ secrets.STORAGE_TOKEN }}
      GITHUB_STORAGE_REPO: PanavMhatre/openclips-media
      GITHUB_STORAGE_BRANCH: main
      GITHUB_STORAGE_DIR: clips
      BUFFER_CHANNEL_INCLUDE: podbyteedits,podbyte
      BUFFER_CHANNEL_EXCLUDE: clipvltdaily,clipvlt
      PORT: 3000
      OPENCLIPS_GROQ_CHAT_MODEL: openai/gpt-oss-120b
      OPENCLIPS_GROQ_TRANSCRIBE_MODEL: whisper-large-v3-turbo
      # Keep clips local so enhance script can process them
      OPENCLIPS_DELETE_LOCAL_VIDEO_AFTER_CLOUD: "false"
      # Run 2 ffmpeg renders concurrently (1 encode + 1 filter thread each) on
      # the 2-vCPU runner. Filter threads default to 3 if unset, which would
      # let 2 concurrent renders spin up 6 filter threads + 2 encode threads
      # (8 total) fighting over 2 vCPUs — pin it down to match the budget.
      OPENCLIPS_MAX_RENDER_JOBS: "2"
      OPENCLIPS_FFMPEG_THREADS: "1"
      OPENCLIPS_FFMPEG_FILTER_THREADS: "1"
      OPENCLIPS_MAX_YTDLP_JOBS: "3"
      # Persist ledger inside data/ so it survives in the GitHub Actions cache
      OPENCLIPS_BUFFER_LEDGER: data/buffer-ledger.json
      YTDLP_PROXIES: ${{ secrets.YTDLP_PROXIES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Cache projects.json + clips (excludes huge sources/ and uploads/)
      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            data/projects.json
            data/clips
            data/captions
            data/thumbs
            data/performance-signals.json
            data/strategy-brief.md
            data/buffer-ledger.json
          key: openclips-data-${{ github.run_id }}
          restore-keys: |
            openclips-data-

      - name: Install dependencies
        run: npm ci

      - name: Install yt-dlp, ffmpeg & deno
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg unzip python3-pip
          sudo pip3 install --break-system-packages yt-dlp bgutil-ytdlp-pot-provider
          yt-dlp --version
          ffmpeg -version | head -1
          # Deno — used by yt-dlp to solve YouTube n-parameter JS challenges
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          # Copy bgutil plugin into yt-dlp's config plugin dir so yt-dlp's own loader
          # finds it regardless of Python namespace path issues with pip install locations.
          BGU_PATH=$(pip3 show bgutil-ytdlp-pot-provider 2>/dev/null | grep Location | awk '{print $2}')
          echo "bgutil pip location: ${BGU_PATH:-not found}"
          if [ -n "$BGU_PATH" ] && [ -d "$BGU_PATH/yt_dlp_plugins" ]; then
            mkdir -p ~/.config/yt-dlp/plugins/bgutil
            cp -r "$BGU_PATH/yt_dlp_plugins" ~/.config/yt-dlp/plugins/bgutil/
            echo "bgutil plugin copied to ~/.config/yt-dlp/plugins/bgutil/yt_dlp_plugins"
            find ~/.config/yt-dlp/plugins/bgutil -type f | head -10
          else
            echo "WARNING: yt_dlp_plugins dir not found under $BGU_PATH"
            pip3 show -f bgutil-ytdlp-pot-provider 2>/dev/null | head -30 || true
          fi

      - name: Wait for bgutil PO token service
        run: |
          for i in $(seq 1 30); do
            curl -s -o /dev/null http://127.0.0.1:4416/ && { echo "POT provider ready after ${i}s"; break; }
            sleep 1
          done

      - name: Setup YouTube cookies
        env:
          COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
        run: |
          if [ -n "$COOKIES_B64" ]; then
            echo "$COOKIES_B64" | base64 -d > /tmp/yt-cookies.txt
            echo "YOUTUBE_COOKIES_FILE=/tmp/yt-cookies.txt" >> $GITHUB_ENV
            echo "YouTube cookies loaded."
          else
            echo "Warning: YOUTUBE_COOKIES_B64 secret not set — bot-check likely."
          fi

      - name: Setup yt-dlp config
        run: node scripts/setup-ytdlp.mjs

      - name: Verify bgutil plugin and cookies
        run: |
          echo "=== yt-dlp version ==="
          yt-dlp --version
          echo "=== yt-dlp config file ==="
          cat ~/.config/yt-dlp/config || echo "WARNING: no config file"
          echo "=== bgutil plugin files in yt-dlp config dir ==="
          find ~/.config/yt-dlp/plugins/bgutil -type f 2>/dev/null || echo "WARNING: no bgutil plugin files in ~/.config/yt-dlp/plugins/bgutil"
          echo "=== bgutil Python import test ==="
          python3 - <<'PYEOF'
          import sys, traceback
          sys.path.insert(0, '/home/runner/.config/yt-dlp/plugins/bgutil')
          try:
              from yt_dlp_plugins.extractor.getpot_bgutil import BgUtilPTPBase
              print("OK: getpot_bgutil base imported")
          except Exception as e:
              print(f"FAIL getpot_bgutil: {type(e).__name__}: {e}")
              traceback.print_exc()
          try:
              from yt_dlp_plugins.extractor.getpot_bgutil_http import BgUtilHTTPPTP
              print("OK: getpot_bgutil_http imported")
          except Exception as e:
              print(f"FAIL getpot_bgutil_http: {type(e).__name__}: {e}")
              traceback.print_exc()
          try:
              from yt_dlp.extractor.youtube.pot._registry import _pot_providers
              providers = list(_pot_providers.value.keys())
              print(f"POT providers registered: {providers}")
          except Exception as e:
              print(f"FAIL registry: {type(e).__name__}: {e}")
          PYEOF
          echo "=== yt-dlp verbose on public video (skip download) ==="
          yt-dlp --verbose --skip-download \
            "https://www.youtube.com/watch?v=jNQXAC9IVRw" 2>&1 | \
            grep -iE "PO Token|PoToken|provider|plugin|bgutil|GetPOT|pot_provider" | head -30 || true
          echo "=== bgutil service smoke test ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4416/ 2>/dev/null)
          echo "bgutil HTTP status: $STATUS (any response = service is up)"
          echo "=== Cookie file check ==="
          if [ -f /tmp/yt-cookies.txt ]; then
            echo "Cookie file: $(wc -l < /tmp/yt-cookies.txt) lines, $(stat -c%s /tmp/yt-cookies.txt) bytes"
            grep -c "youtube.com" /tmp/yt-cookies.txt && echo "Contains youtube.com entries" || echo "WARNING: no youtube.com entries found"
          else
            echo "ERROR: no cookie file at /tmp/yt-cookies.txt"
          fi

      - name: Start OpenClips server
        run: |
          node server/index.mjs &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 20); do
            sleep 1
            STATUS=$(curl -sf http://localhost:3000/api/health 2>/dev/null | node -e "try{const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));console.log(d.ffmpeg&&d.ytDlp&&d.groq?'ok':'bad')}catch{console.log('bad')}" 2>/dev/null || echo "bad")
            if [ "$STATUS" = "ok" ]; then echo "Server healthy after ${i}s"; break; fi
          done
          curl -sf http://localhost:3000/api/health | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));console.log('Health:',JSON.stringify(d,null,2))"

      - name: Test Oracle VM connectivity
        if: ${{ github.event.inputs.skip_fetch != 'true' }}
        run: |
          if [ -z "$OPENCLIPS_ORACLE_URL" ]; then
            echo "OPENCLIPS_ORACLE_URL is not set — will try Render fallback"
          else
            echo "Testing Oracle VM: $OPENCLIPS_ORACLE_URL"
            curl -v --max-time 15 "$OPENCLIPS_ORACLE_URL/health" 2>&1 || echo "Oracle VM health check failed (exit $?)"
          fi

      - name: Generate dynamic daily search queries
        if: ${{ github.event.inputs.skip_fetch != 'true' }}
        continue-on-error: true
        run: |
          node scripts/generate-daily-queries.mjs
          if [ -f /tmp/oc-dynamic-daily-roster.md ]; then
            echo "DYNAMIC_DAILY_ROSTER_READY=true" >> $GITHUB_ENV
            echo "=== Dynamic daily roster preview ==="
            cat /tmp/oc-dynamic-daily-roster.md
          else
            echo "DYNAMIC_DAILY_ROSTER_READY=false" >> $GITHUB_ENV
            echo "Dynamic daily roster generation failed — will use static roster"
          fi

      - name: Fetch newest YouTube videos via Render
        if: ${{ github.event.inputs.skip_fetch != 'true' }}
        env:
          COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
        run: |
          # Fetch 3 source videos so the ranker has a good pool to select 7 clips from
          if [ "$DYNAMIC_DAILY_ROSTER_READY" = "true" ]; then
            echo "Using dynamic roster from NewsAPI + YouTube trending (fetching 3 videos)"
            node scripts/fetch-via-render.mjs --roster-file=/tmp/oc-dynamic-daily-roster.md --min-duration=1200 --total=3 --output=/tmp/oc-fresh-urls.json
          else
            echo "Using static daily roster (fetching 3 videos)"
            node scripts/fetch-via-render.mjs --roster=daily --min-duration=1200 --total=3 --output=/tmp/oc-fresh-urls.json
          fi
          echo "Videos queued:"
          cat /tmp/oc-fresh-urls.json | node -e "const a=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));a.forEach(v=>console.log(' -',v.title||v.url))"

      - name: Submit & process videos
        if: ${{ github.event.inputs.skip_fetch != 'true' }}
        continue-on-error: true
        run: |
          node scripts/submit-openclips-projects.mjs \
            --input=/tmp/oc-fresh-urls.json \
            --poll-interval=15000 \
            --timeout=18000000 \
            --output=/tmp/oc-finished-projects.json

      - name: Fetch performance analytics
        run: |
          node scripts/fetch-performance-analytics.mjs --output=data/performance-signals.json || true
          if [ -f data/performance-signals.json ]; then
            echo "Analytics loaded:"
            node -e "const d=JSON.parse(require('fs').readFileSync('data/performance-signals.json','utf8'));console.log('  Posts analysed:',d.summary.zernioPostsAnalysed);console.log('  YT channels:',d.summary.youtubeChannelsAnalysed);console.log('  Top topics:',d.summary.topTopics?.join(', '))"
          fi

      - name: Rank top clips
        run: |
          TOP_N="${{ github.event.inputs.clip_count }}"
          node scripts/rank-openclips-clips.mjs --top="${TOP_N:-7}" --output=/tmp/oc-top8.json
          echo "Top clips:"
          cat /tmp/oc-top8.json | node -e "
            const clips=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            clips.forEach((c,i)=>console.log(\`  \${i+1}. \${c.hook||c.title} (\${Math.round((c.duration||0))}s)\`))
          "

      - name: Download clips for enhancement
        timeout-minutes: 10
        run: |
          # Clips not present locally (cloud-only) — download from GitHub storage
          node -e "
            const clips = JSON.parse(require('fs').readFileSync('/tmp/oc-top8.json','utf8'));
            const https = require('https');
            const http = require('http');
            const fs = require('fs');
            const path = require('path');
            fs.mkdirSync('data/clips', { recursive: true });
            let pending = 0;
            for (const clip of clips) {
              const url = clip.downloadUrl;
              if (!url || !/^https?:\/\//i.test(url)) continue;
              const dest = path.join('data/clips', path.basename(url));
              if (fs.existsSync(dest)) { console.log('Already local:', path.basename(dest)); continue; }
              pending++;
              const mod = url.startsWith('https') ? https : http;
              const file = fs.createWriteStream(dest);
              const req = mod.get(url, { timeout: 30000 }, res => {
                res.pipe(file);
                file.on('finish', () => { file.close(); console.log('Downloaded:', path.basename(dest)); pending--; });
              });
              req.on('timeout', () => { req.destroy(new Error('timed out')); });
              req.on('error', e => { fs.unlink(dest, ()=>{}); console.error('Failed:', path.basename(dest), e.message); pending--; });
            }
            // Simple wait — bounded by the step-level timeout-minutes above,
            // which is the real backstop if a download stalls after connecting
            // (the request-level timeout only catches a stalled/no-response
            // connection, not a connection that accepts but trickles slowly).
            const wait = () => { if (pending > 0) setTimeout(wait, 500); };
            wait();
          "

      - name: Enhance clips with Pixabay images
        # Re-encode pass now runs at crf 18/medium (up from crf 22/fast) to match
        # the main render's quality tier, so it needs more headroom per clip.
        timeout-minutes: 30
        continue-on-error: true
        run: node scripts/enhance-clips-with-images.mjs --clips=/tmp/oc-top8.json

      - name: Push enhanced clips to storage repo
        run: |
          # Upload enhanced clips back to openclips-media so Buffer URLs are correct
          CLIPS=$(cat /tmp/oc-top8.json | node -e "
            const c=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            c.forEach(x=>{ const f=x._fileName||require('path').basename(x._filePath||''); if(f) console.log(f); });
          ")
          if [ -z "$CLIPS" ]; then echo "No clip filenames found, skipping push."; exit 0; fi

          git clone --depth 1 https://x-access-token:${{ secrets.STORAGE_TOKEN }}@github.com/PanavMhatre/openclips-media.git /tmp/storage-repo
          mkdir -p /tmp/storage-repo/clips

          for CLIP in $CLIPS; do
            SRC="data/clips/$CLIP"
            if [ -f "$SRC" ]; then
              cp "$SRC" "/tmp/storage-repo/clips/$CLIP"
              echo "Staged: $CLIP"
            fi
          done

          cd /tmp/storage-repo
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add clips/
          git diff --staged --quiet && echo "No changes to push." || git commit -m "Enhanced clips $(date +%Y-%m-%d)" && git push

      - name: Schedule to Buffer (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          if [ -n "${{ github.event.inputs.publish_date }}" ]; then
            MODE_ARG="--date=${{ github.event.inputs.publish_date }}"
          else
            MODE_ARG="--now"
          fi
          node scripts/buffer-schedule.mjs --clips=/tmp/oc-top8.json --dry-run $MODE_ARG

      - name: Schedule to Buffer (live)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -n "${{ github.event.inputs.publish_date }}" ]; then
            MODE_ARG="--date=${{ github.event.inputs.publish_date }}"
          else
            MODE_ARG="--now"
          fi
          node scripts/buffer-schedule.mjs --clips=/tmp/oc-top8.json $MODE_ARG

      - name: Cleanup old source files
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/cleanup-old-sources.mjs

      - name: Save data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/projects.json
            data/clips
            data/captions
            data/thumbs
            data/performance-signals.json
            data/strategy-brief.md
            data/buffer-ledger.json
          key: openclips-data-${{ github.run_id }}

      - name: Upload ledger as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buffer-ledger-${{ github.run_id }}
          path: data/buffer-ledger.json
          if-no-files-found: ignore
